services:
  - type: web
    name: contatos-api
    runtime: node
    rootDir: api
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: contatos-db
          property: connectionString

databases:
  - name: contatos-db
    databaseName: contatos
    user: contatos_user
